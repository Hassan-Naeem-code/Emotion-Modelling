name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  track-a-python:
    name: Track A — Python tests + dry-run pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Unit tests
        run: python -m pytest tests/ -q
      - name: End-to-end smoke test on synthetic data
        run: |
          python -m train.train --config configs/evidential.yaml --dry-run
          python -m eval.run_eval --config configs/evidential.yaml \
            --ckpt results/evidential/seed1337/best.pt --dry-run
          python -m eval.aggregate

  track-b-demo:
    name: Track B — demo logic tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: demo/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
