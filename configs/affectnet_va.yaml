_inherit: evidential.yaml
name: affectnet_va_evidential
# Primary method (evidential) on the real AffectNet valence/arousal data
# (Kaggle 'affectnetvae' layout). Uses the dataset's own Train/Validation/Test.
#   python -m train.train --config configs/affectnet_va.yaml
data:
  name: affectnet_va
  # AffectNet images are already face-cropped, so a center crop works well.
  # Set align: true ONLY if you have a working mediapipe install (for eye-based
  # alignment matching the demo); it falls back to center-crop otherwise.
  align: false
